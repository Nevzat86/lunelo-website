<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1a1a1a" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4757"/>
      <stop offset="50%" style="stop-color:#FECA57"/>
      <stop offset="100%" style="stop-color:#FF6B81"/>
    </linearGradient>
  </defs>

  <!-- Main text "LUNELO" -->
  <text x="350" y="120" font-family="'Nunito', 'Arial Black', sans-serif" font-size="110" font-weight="900" fill="url(#grad)" text-anchor="middle" filter="url(#shadow)" letter-spacing="6">
    LUNELO
  </text>

  <!-- Playful star accent -->
  <g transform="translate(560, 35)">
    <polygon points="0,-16 4,-6 15,-10 7,-1 16,5 6,5 4,16 0,8 -4,16 -6,5 -16,5 -7,-1 -15,-10 -4,-6" fill="#FECA57" stroke="#FF4757" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#FF4757"/>
  </g>

  <!-- Tagline -->
  <text x="350" y="160" font-family="'Nunito', sans-serif" font-size="22" font-weight="900" fill="#888" text-anchor="middle" letter-spacing="8">
    SPILL &amp; LÆR
  </text>
</svg>
