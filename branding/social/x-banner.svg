<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E6"/>
      <stop offset="100%" style="stop-color:#FFE8C0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFA94D"/>
      <stop offset="100%" style="stop-color:#E8890A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#a05000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="420" r="200" fill="#FFA94D" opacity="0.08"/>
  <circle cx="1400" cy="80" r="250" fill="#FFD43B" opacity="0.07"/>
  <!-- Icon box -->
  <rect x="480" y="140" width="200" height="200" rx="44" ry="44" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="580" y="282" font-family="'Arial Rounded MT Bold','Arial Black',sans-serif" font-size="150" font-weight="900" fill="#FFFFFF" text-anchor="middle">L</text>
  <!-- LUNELO text -->
  <text x="740" y="260" font-family="'Arial Black',sans-serif" font-size="110" font-weight="900" fill="#2D3436" text-anchor="start" filter="url(#shadow)">LUNELO</text>
  <!-- Tagline -->
  <text x="740" y="320" font-family="'Segoe UI',sans-serif" font-size="30" fill="#636E72" text-anchor="start" letter-spacing="4">TRYGG LÆRING GJENNOM LEK</text>
  <!-- Star -->
  <g transform="translate(1290, 150)">
    <polygon points="0,-22 4,-8 18,-12 9,-2 20,7 7,7 6,22 0,12 -6,22 -7,7 -20,7 -9,-2 -18,-12 -4,-8" fill="#FFD43B" stroke="#FFA94D" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="6" fill="#FFA94D"/>
  </g>
</svg>
