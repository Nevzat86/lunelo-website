<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3436"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2D3436"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1a1a1a" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="400" r="150" fill="#FF4757" opacity="0.1"/>
  <circle cx="1400" cy="100" r="200" fill="#FECA57" opacity="0.08"/>
  <circle cx="750" cy="250" r="300" fill="#FF4757" opacity="0.05"/>
  <!-- BONK text -->
  <text x="540" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="150" font-weight="900" fill="#FF4757" stroke="#FF4757" stroke-width="2" filter="url(#shadow)">B</text>
  <text x="660" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="150" font-weight="900" fill="#FECA57" stroke="#FECA57" stroke-width="2" filter="url(#shadow)">O</text>
  <text x="790" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="150" font-weight="900" fill="#FF4757" stroke="#FF4757" stroke-width="2" filter="url(#shadow)">N</text>
  <text x="920" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="150" font-weight="900" fill="#FECA57" stroke="#FECA57" stroke-width="2" filter="url(#shadow)">K</text>
  <!-- Explosion over O -->
  <g transform="translate(720, 130)">
    <polygon points="0,-35 7,-12 32,-20 14,-2 35,10 12,10 10,35 0,16 -10,35 -12,10 -35,10 -14,-2 -32,-20 -7,-12" fill="#FECA57" stroke="#FF4757" stroke-width="2"/>
    <circle cx="0" cy="0" r="9" fill="#FF4757"/>
    <circle cx="22" cy="-26" r="4" fill="#FECA57"/>
    <circle cx="-24" cy="-22" r="3" fill="#FF4757"/>
  </g>
  <!-- GAMES subtitle -->
  <text x="750" y="350" font-family="'Arial Black', Impact, sans-serif" font-size="50" fill="#ffffff" text-anchor="middle" letter-spacing="18" opacity="0.9">GAMES</text>
  <!-- Tagline -->
  <text x="750" y="410" font-family="'Segoe UI', sans-serif" font-size="22" fill="#888" text-anchor="middle" letter-spacing="4">HIT PLAY. HAVE FUN.</text>
  <!-- Impact lines left -->
  <line x1="480" y1="200" x2="440" y2="180" stroke="#FECA57" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="470" y1="240" x2="425" y2="240" stroke="#FECA57" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="480" y1="280" x2="440" y2="300" stroke="#FECA57" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Impact lines right -->
  <line x1="1020" y1="200" x2="1060" y2="180" stroke="#FF4757" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="1030" y1="240" x2="1075" y2="240" stroke="#FF4757" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="1020" y1="280" x2="1060" y2="300" stroke="#FF4757" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>