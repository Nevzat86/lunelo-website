      <stop offset="0%" style="stop-color:#FFF5E6"/>
      <stop offset="100%" style="stop-color:#FFE8C0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA94D"/>
      <stop offset="100%" style="stop-color:#E8890A"/>
    </linearGradient>
    <filter id="shadow">
