<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3436"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2D3436"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#1a1a1a" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="2560" height="1440" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="200" cy="1200" r="300" fill="#FF4757" opacity="0.08"/>
  <circle cx="2400" cy="200" r="350" fill="#FECA57" opacity="0.06"/>
  <circle cx="1280" cy="720" r="500" fill="#FF4757" opacity="0.04"/>
  <!-- Safe zone guide (invisible, 1546x423 centered) -->
  <!-- BONK -->
  <text x="900" y="780" font-family="'Arial Black', Impact, sans-serif" font-size="250" font-weight="900" fill="#FF4757" filter="url(#shadow)">B</text>
  <text x="1080" y="780" font-family="'Arial Black', Impact, sans-serif" font-size="250" font-weight="900" fill="#FECA57" filter="url(#shadow)">O</text>
  <text x="1280" y="780" font-family="'Arial Black', Impact, sans-serif" font-size="250" font-weight="900" fill="#FF4757" filter="url(#shadow)">N</text>
  <text x="1480" y="780" font-family="'Arial Black', Impact, sans-serif" font-size="250" font-weight="900" fill="#FECA57" filter="url(#shadow)">K</text>
  <!-- Explosion -->
  <g transform="translate(1170, 500)">
    <polygon points="0,-50 10,-18 48,-30 20,-3 50,14 18,14 14,50 0,24 -14,50 -18,14 -50,14 -20,-3 -48,-30 -10,-18" fill="#FECA57" stroke="#FF4757" stroke-width="3"/>
    <circle cx="0" cy="0" r="14" fill="#FF4757"/>
  </g>
  <!-- GAMES -->
  <text x="1280" y="880" font-family="'Arial Black', Impact, sans-serif" font-size="80" fill="#ffffff" text-anchor="middle" letter-spacing="25" opacity="0.9">GAMES</text>
  <!-- Tagline -->
  <text x="1280" y="960" font-family="'Segoe UI', sans-serif" font-size="36" fill="#888" text-anchor="middle" letter-spacing="6">HIT PLAY. HAVE FUN.</text>
</svg>