<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B81;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1a1a1a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bg-gradient)"/>

  <!-- Letter "B" -->
  <text x="256" y="340" font-family="'Arial Black', Impact, sans-serif" font-size="280" font-weight="900" fill="#FFFFFF" stroke="#2D3436" stroke-width="6" text-anchor="middle" filter="url(#shadow)">
    B
  </text>

  <!-- Explosion/star burst top right -->
  <g transform="translate(380, 100)">
    <polygon points="0,-40 8,-14 36,-24 16,-3 40,10 14,10 10,40 0,18 -10,40 -14,10 -40,10 -16,-3 -36,-24 -8,-14" fill="#FECA57" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#FFFFFF"/>
    <!-- Sparkle dots -->
    <circle cx="24" cy="-30" r="4" fill="#FECA57"/>
    <circle cx="-26" cy="-26" r="3" fill="#FFFFFF"/>
    <circle cx="30" cy="18" r="3" fill="#FECA57"/>
  </g>

  <!-- Small impact lines around the B -->
  <line x1="90" y1="180" x2="60" y2="160" stroke="#FECA57" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="220" x2="45" y2="220" stroke="#FECA57" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="260" x2="55" y2="275" stroke="#FECA57" stroke-width="3" stroke-linecap="round"/>
</svg>