<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lilita+One&amp;display=swap');
    </style>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#1a1a1a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background (transparent) -->

  <!-- Main text "BONK" -->
  <text x="160" y="130" font-family="'Lilita One', 'Arial Black', Impact, sans-serif" font-size="120" font-weight="900" fill="#FF4757" stroke="#2D3436" stroke-width="4" filter="url(#shadow)" letter-spacing="2">
    B
  </text>
  <text x="230" y="130" font-family="'Lilita One', 'Arial Black', Impact, sans-serif" font-size="120" font-weight="900" fill="#FECA57" stroke="#2D3436" stroke-width="4" filter="url(#shadow)" letter-spacing="2">
    O
  </text>
  <text x="310" y="130" font-family="'Lilita One', 'Arial Black', Impact, sans-serif" font-size="120" font-weight="900" fill="#FF4757" stroke="#2D3436" stroke-width="4" filter="url(#shadow)" letter-spacing="2">
    N
  </text>
  <text x="395" y="130" font-family="'Lilita One', 'Arial Black', Impact, sans-serif" font-size="120" font-weight="900" fill="#FECA57" stroke="#2D3436" stroke-width="4" filter="url(#shadow)" letter-spacing="2">
    K
  </text>

  <!-- Explosion/star burst over the "O" -->
  <g transform="translate(275, 45)">
    <!-- Outer spikes -->
    <polygon points="0,-30 6,-10 28,-18 12,-2 30,8 10,8 8,30 0,14 -8,30 -10,8 -30,8 -12,-2 -28,-18 -6,-10" fill="#FECA57" stroke="#FF4757" stroke-width="2"/>
    <!-- Inner star -->
    <circle cx="0" cy="0" r="8" fill="#FF4757"/>
    <!-- Small sparkle dots -->
    <circle cx="18" cy="-22" r="3" fill="#FECA57"/>
    <circle cx="-20" cy="-20" r="2" fill="#FF4757"/>
    <circle cx="24" cy="14" r="2.5" fill="#FECA57"/>
  </g>

  <!-- "GAMES" subtitle -->
  <text x="300" y="175" font-family="'Lilita One', 'Arial Black', Impact, sans-serif" font-size="36" font-weight="700" fill="#2D3436" text-anchor="middle" letter-spacing="12">
    GAMES
  </text>
</svg>