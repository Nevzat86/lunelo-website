<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E6"/>
      <stop offset="100%" style="stop-color:#FFE0A0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA94D"/>
      <stop offset="100%" style="stop-color:#E8890A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a05000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <!-- Decorative dots pattern -->
  <circle cx="80" cy="80" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="160" cy="80" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="240" cy="80" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="80" cy="160" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="160" cy="160" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="80" cy="240" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="944" cy="420" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="864" cy="420" r="5" fill="#FFA94D" opacity="0.25"/>
  <circle cx="944" cy="340" r="5" fill="#FFA94D" opacity="0.25"/>
  <!-- Background glow circles -->
  <circle cx="150" cy="420" r="200" fill="#FFA94D" opacity="0.08"/>
  <circle cx="900" cy="80" r="200" fill="#FFD43B" opacity="0.07"/>
  <!-- Icon box -->
  <rect x="130" y="130" width="240" height="240" rx="55" ry="55" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="250" y="308" font-family="'Arial Rounded MT Bold','Arial Black',sans-serif" font-size="190" font-weight="900" fill="#FFFFFF" text-anchor="middle">L</text>
  <!-- Star on icon -->
  <g transform="translate(335, 145)">
    <polygon points="0,-20 4,-7 17,-11 8,-1 18,6 7,6 5,20 0,10 -5,20 -7,6 -18,6 -8,-1 -17,-11 -4,-7" fill="#FFD43B" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
  </g>
  <!-- LUNELO text -->
  <text x="420" y="250" font-family="'Arial Black',sans-serif" font-size="96" font-weight="900" fill="#2D3436" text-anchor="start" filter="url(#shadow)">LUNELO</text>
  <!-- Tagline -->
  <text x="422" y="306" font-family="'Segoe UI',sans-serif" font-size="26" fill="#636E72" text-anchor="start" letter-spacing="4">TRYGG LÆRING GJENNOM LEK</text>
  <!-- Badges row -->
  <rect x="422" y="335" width="120" height="34" rx="17" fill="#FFA94D" opacity="0.18"/>
  <text x="482" y="357" font-family="'Segoe UI',sans-serif" font-size="16" fill="#E8890A" font-weight="700" text-anchor="middle">4–8 ÅR</text>
  <rect x="552" y="335" width="150" height="34" rx="17" fill="#69DB7C" opacity="0.2"/>
  <text x="627" y="357" font-family="'Segoe UI',sans-serif" font-size="16" fill="#2a7a3a" font-weight="700" text-anchor="middle">UTEN REKLAME</text>
  <rect x="712" y="335" width="130" height="34" rx="17" fill="#4DABF7" opacity="0.2"/>
  <text x="777" y="357" font-family="'Segoe UI',sans-serif" font-size="16" fill="#1339a8" font-weight="700" text-anchor="middle">42 SPILL</text>
</svg>
