<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4757"/>
      <stop offset="50%" style="stop-color:#FF6B81"/>
      <stop offset="100%" style="stop-color:#FF4757"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#1a1a1a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <!-- Pattern dots -->
  <circle cx="80" cy="80" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="160" cy="80" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="240" cy="80" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="80" cy="160" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="160" cy="160" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="80" cy="240" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="944" cy="420" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="864" cy="420" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="784" cy="420" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="944" cy="340" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="864" cy="340" r="6" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="944" cy="260" r="6" fill="#FFFFFF" opacity="0.15"/>
  <!-- BONK -->
  <text x="310" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="180" font-weight="900" fill="#FFFFFF" stroke="#2D3436" stroke-width="4" filter="url(#shadow)">B</text>
  <text x="440" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="180" font-weight="900" fill="#FECA57" stroke="#2D3436" stroke-width="4" filter="url(#shadow)">O</text>
  <text x="585" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="180" font-weight="900" fill="#FFFFFF" stroke="#2D3436" stroke-width="4" filter="url(#shadow)">N</text>
  <text x="730" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="180" font-weight="900" fill="#FECA57" stroke="#2D3436" stroke-width="4" filter="url(#shadow)">K</text>
  <!-- Explosion -->
  <g transform="translate(510, 95)">
    <polygon points="0,-40 8,-14 36,-24 16,-3 40,10 14,10 10,40 0,18 -10,40 -14,10 -40,10 -16,-3 -36,-24 -8,-14" fill="#FECA57" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#FFFFFF"/>
    <circle cx="24" cy="-30" r="4" fill="#FECA57"/>
    <circle cx="-26" cy="-26" r="3" fill="#FFFFFF"/>
  </g>
  <!-- GAMES -->
  <text x="512" y="365" font-family="'Arial Black', Impact, sans-serif" font-size="55" fill="#FFFFFF" text-anchor="middle" letter-spacing="15" opacity="0.95">GAMES</text>
  <!-- Tagline -->
  <text x="512" y="420" font-family="'Segoe UI', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" letter-spacing="4" opacity="0.8">HIT PLAY. HAVE FUN.</text>
</svg>