<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA94D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8890A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="letter-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#a05000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bg-gradient)"/>

  <!-- Subtle shine overlay top half -->
  <rect x="0" y="0" width="512" height="256" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Letter "L" — bold, centered -->
  <text
    x="248"
    y="358"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Arial Black', sans-serif"
    font-size="300"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    filter="url(#letter-shadow)"
    letter-spacing="-8"
  >L</text>

  <!-- Star accent top-right -->
  <g transform="translate(388, 96)">
    <polygon
      points="0,-30 6,-11 25,-17 13,-2 28,9 10,9 8,30 0,16 -8,30 -10,9 -28,9 -13,-2 -25,-17 -6,-11"
      fill="#FFD43B"
      stroke="#FFFFFF"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Sparkle dot bottom-left -->
  <circle cx="108" cy="390" r="12" fill="#FFD43B" opacity="0.7"/>
  <circle cx="108" cy="390" r="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Sparkle dot top-left -->
  <circle cx="130" cy="118" r="8" fill="#FFD43B" opacity="0.6"/>
</svg>
