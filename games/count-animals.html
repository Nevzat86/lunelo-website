<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tell dyrene – LearningKidz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #FFF3E0, #ffe8cc);
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.08); color: #E67700; font-size: 18px;
      font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .progress { display: flex; gap: 4px; align-items: center; flex: 1; justify-content: center; }
    .dot { width: 8px; height: 8px; border-radius: 100px; background: #f0d5b5; transition: all 0.3s; }
    .dot.active { width: 18px; background: #FFA94D; }
    .dot.done { background: #69DB7C; }

    .score-badge {
      background: #FFE8CC; color: #E67700; font-weight: 800; font-size: 13px;
      padding: 5px 12px; border-radius: 100px; border: 2px solid #FFA94D;
    }

    .game-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 16px 16px;
      gap: 12px;
    }

    .instruction {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 800;
      color: #E67700;
    }

    .animal-area {
      position: relative;
      width: 100%;
      max-width: 340px;
      height: clamp(160px, 35vh, 260px);
      background: rgba(255,255,255,0.5);
      border-radius: 20px;
      border: 2px dashed #f0c89a;
      overflow: hidden;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .animal {
      position: absolute;
      font-size: clamp(32px, 8vw, 44px);
      animation: animalBounce 2s ease-in-out infinite;
    }

    @keyframes animalBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .feedback {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 800;
      min-height: 28px;
    }
    .feedback.correct { color: #2B8A3E; }
    .feedback.wrong { color: #E03131; }

    .options {
      display: flex;
      gap: clamp(10px, 3vw, 16px);
      flex-wrap: wrap;
      justify-content: center;
      max-width: 380px;
    }

    .option-btn {
      width: clamp(70px, 18vw, 90px);
      height: clamp(70px, 18vw, 90px);
      border-radius: 18px;
      border: 3px solid transparent;
      background: #FFA94D;
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(230, 119, 0, 0.2);
      animation: slideUp 0.3s ease-out both;
    }

    .option-btn:nth-child(1) { animation-delay: 0.05s; }
    .option-btn:nth-child(2) { animation-delay: 0.1s; }
    .option-btn:nth-child(3) { animation-delay: 0.15s; }
    .option-btn:nth-child(4) { animation-delay: 0.2s; }

    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .option-btn:active { transform: scale(0.93); }
    .option-btn.correct { border-color: #2B8A3E; background: #51CF66; animation: pulse 0.4s ease; }
    .option-btn.wrong { animation: shake 0.4s ease; }

    @keyframes pulse { 0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);} }
    @keyframes shake { 0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);} }

    .game { flex: 1; display: flex; flex-direction: column; }
    .result { display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; padding:24px; gap:10px; }
    .result.show { display: flex; }
    .game.hide { display: none; }

    .result-emoji { font-size: 56px; }
    .result-title { font-size: clamp(22px, 6vw, 30px); font-weight: 900; color: #E67700; }
    .result-score { font-size: 16px; color: #555; font-weight: 600; }
    .result-stars { font-size: 32px; letter-spacing: 4px; }

    .result-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 260px; margin-top: 8px; }
    .btn-primary, .btn-secondary, .btn-ghost {
      padding: 14px 24px; border: none; border-radius: 100px;
      font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; display: block;
    }
    .btn-primary { background: #FFA94D; color: #fff; }
    .btn-secondary { background: #fff; color: #E67700; border: 2px solid #f0c89a; }
    .btn-ghost { background: none; color: #888; font-size: 13px; padding: 8px; }
  </style>
</head>
<body>

<div class="game" id="game">
  <div class="top-bar">
    <button class="back-btn" onclick="closeGame()" title="Tilbake">&times;</button>
    <div class="progress" id="progress"></div>
    <div class="score-badge" id="score">0</div>
  </div>
  <div class="game-body">
    <div class="instruction">Tell dyrene!</div>
    <div class="animal-area" id="animalArea"></div>
    <div class="feedback" id="feedback">&nbsp;</div>
    <div class="options" id="options"></div>
  </div>
</div>

<div class="result" id="result">
  <div class="result-emoji">&#x1F389;</div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-stars" id="resultStars"></div>
  <div class="result-buttons">
    <button class="btn-primary" onclick="startGame()">Spill igjen</button>
    <button class="btn-secondary" onclick="closeGame()">Pr&oslash;v et annet spill</button>
    <span class="btn-ghost" style="color:#aaa;">Appen kommer snart p&aring; Google Play</span>
  </div>
</div>

<script>
  const ANIMALS = ['\u{1F436}','\u{1F431}','\u{1F42D}','\u{1F439}','\u{1F430}','\u{1F98A}','\u{1F43B}','\u{1F43C}','\u{1F428}','\u{1F42F}','\u{1F981}','\u{1F438}','\u{1F435}','\u{1F414}','\u{1F427}','\u{1F426}','\u{1F986}','\u{1F984}','\u{1F41D}','\u{1F422}'];
  const TOTAL = 10;
  let round, score, correct, locked;

  function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
  function closeGame(){if(window.parent!==window)window.parent.postMessage('close-game','*');}
  function getMax(r){return r<4?5:r<7?8:10;}

  function startGame(){
    round=0;score=0;correct=0;locked=false;
    document.getElementById('game').classList.remove('hide');
    document.getElementById('result').classList.remove('show');
    renderRound();
  }

  function renderRound(){
    locked=false;
    const fb=document.getElementById('feedback');
    fb.innerHTML='&nbsp;';fb.className='feedback';
    const prog=document.getElementById('progress');
    prog.innerHTML='';
    for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i<round?' done':'')+(i===round?' active':'');prog.appendChild(d);}
    document.getElementById('score').textContent=score;
    const count=Math.floor(Math.random()*getMax(round))+1;
    const animal=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
    const area=document.getElementById('animalArea');
    area.innerHTML='';area.style.animation='none';area.offsetHeight;
    area.style.animation='popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    for(let i=0;i<count;i++){
      const el=document.createElement('span');el.className='animal';el.textContent=animal;
      const angle=i*137.508*(Math.PI/180);
      const top=50+Math.sin(angle)*35;
      const left=50+Math.cos(angle)*35;
      el.style.top=Math.max(5,Math.min(72,top))+'%';
      el.style.left=Math.max(5,Math.min(78,left))+'%';
      el.style.animationDelay=(i*0.15)+'s';
      area.appendChild(el);
    }
    const wrongSet=new Set();
    while(wrongSet.size<3){const w=Math.floor(Math.random()*12)+1;if(w!==count)wrongSet.add(w);}
    const opts=shuffle([count,...wrongSet]);
    const oc=document.getElementById('options');oc.innerHTML='';
    opts.forEach((num,i)=>{
      const btn=document.createElement('button');btn.className='option-btn';btn.textContent=num;
      btn.style.animation='none';btn.offsetHeight;
      btn.style.animation=`slideUp 0.3s ease-out ${0.05+i*0.05}s both`;
      btn.onclick=()=>handleAnswer(btn,num,count);oc.appendChild(btn);
    });
  }

  function handleAnswer(btn,chosen,target){
    if(locked)return;
    const fb=document.getElementById('feedback');
    if(chosen===target){
      locked=true;btn.classList.add('correct');
      fb.textContent='Riktig! \u2713';fb.className='feedback correct';
      score+=10;correct++;document.getElementById('score').textContent=score;
      setTimeout(()=>{round++;round>=TOTAL?showResult():renderRound();},700);
    }else{
      btn.classList.add('wrong');fb.textContent='Pr\u00f8v igjen!';fb.className='feedback wrong';
      setTimeout(()=>btn.classList.remove('wrong'),400);
    }
  }

  function showResult(){
    document.getElementById('game').classList.add('hide');
    document.getElementById('result').classList.add('show');
    const stars=Math.min(Math.ceil((correct/TOTAL)*3),3);
    document.getElementById('resultTitle').textContent=['Bra jobba!','Fantastisk!','Superstjerne!'][Math.min(stars-1,2)];
    document.getElementById('resultScore').textContent=correct+' av '+TOTAL+' riktige';
    document.getElementById('resultStars').textContent='\u2B50'.repeat(stars)+'\u2606'.repeat(3-stars);
  }

  startGame();
</script>
</body>
</html>
